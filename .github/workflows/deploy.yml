name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 데이터 갱신 + 재배포
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ── Python: 시장 데이터 fetch ─────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install yfinance requests feedparser deep-translator pykrx

      - name: Fetch market data
        run: python scripts/fetch_data.py
        continue-on-error: true   # 데이터 fetch 실패해도 빌드 계속

      # ── Node: React 빌드 ─────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: chmod +x node_modules/.bin/vite
      - run: npm run build

      # ── GitHub Pages 배포 ─────────────────────────────────
      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
